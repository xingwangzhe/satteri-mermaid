name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（留空则使用 package.json 中的版本）"
        required: false
        type: string
      dry-run:
        description: "仅构建不发布"
        required: false
        type: boolean
        default: false

jobs:
  # ── 多平台 napi 构建（每个平台用原生 runner，避免交叉编译） ──
  build-napi:
    name: Build napi (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: bun install --frozen-lockfile

      - name: Build napi (${{ matrix.target }})
        run: bun x napi build --target ${{ matrix.target }} --platform --release --no-js

      - name: Upload .node artifact
        uses: actions/upload-artifact@v5
        with:
          name: napi-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ── JS 层构建 + npm 发布（聚合所有平台 .node 到一个包） ─────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build-napi
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # 下载所有平台的 .node 原生二进制
      - name: Download all .node artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: napi-*
          path: .
          merge-multiple: true

      - name: Verify native binaries
        run: |
          echo "=== Native binaries ==="
          ls -la *.node
          echo "=== dist ==="
          ls -la dist/

      # 构建 JS 层（vite + tsc）
      - name: Build JS layer
        run: bun run build:vite && bun run build:tsc

      # npm 发布
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          else
            VER="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VER"

      - name: Apply version
        run: |
          node -e "
            const p = require('./package.json');
            p.version = '${{ steps.version.outputs.version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish to npm
        if: inputs.dry-run != true
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: inputs.dry-run != true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
